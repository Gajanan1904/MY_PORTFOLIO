<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You — Gajanan Bidwai</title>

    <!-- Styles -->
    <link rel="stylesheet" href="index.css" />

    <!-- Icons — Remix Icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet" />

    <style>
        /* Unique styling for Thanks page */
        .thanks-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: calc(var(--nav-h) + 2rem) 1.5rem 4rem;
        }

        .check-icon {
            font-size: clamp(4rem, 8vw, 6rem);
            color: var(--accent-secondary);
            margin-bottom: 1.5rem;
            animation: pulseGlow 3s ease-in-out infinite;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 50%;
            height: 120px;
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(6, 182, 212, 0.3);
        }
    </style>
</head>

<body>
    <!-- BACKGROUND ORBS -->
    <div class="bg-orbs">
        <span class="o1"></span>
        <span class="o2"></span>
        <span class="o3"></span>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-logo">Gajanan</a>
        <div class="nav-links">
            <div class="theme-toggle" id="themeToggle" title="Toggle theme">
                <i class="ri-moon-line theme-toggle-icon" id="themeIcon"></i>
            </div>
        </div>
    </nav>

    <!-- THANKS SECTION -->
    <section class="thanks-section reveal visible">
        <div class="check-icon">
            <i class="ri-check-line"></i>
        </div>

        <h1 class="hero-name">
            Thanks for <span class="gradient-text">Connecting!</span>
        </h1>

        <p class="hero-desc" style="margin-top: 1rem; margin-bottom: 2.5rem; max-width: 500px;">
            Your message has been sent successfully. I’ll get back to you soon. Have a great day!
        </p>

        <div class="hero-cta">
            <a href="index.html" class="btn btn-primary">
                <i class="ri-arrow-left-line"></i> Back to Portfolio
            </a>
        </div>
    </section>

    <!-- JS -->
    <script src="app.js"></script>
</body>

</html>
